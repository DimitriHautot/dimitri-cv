    - logo:
        link: https://www.rtbf.be/
        label: RTBF
        imageUrl: logos/RTBF.be_2010.svg
      header: January 2010 - September 2015 (5 years, 9 months)
      title: External IT Consultant
      collapsible: true
      ruler: true
      content: |
        *R.T.B.F. - Brussels - full-time - on-site*
        
        I have worked on several projects:
      subItems:
       - header: Project "REPTEL"
         title: Senior Java developer
         collapsible: true
         collapsed: true
         content: |
          Project *REPTEL* was an application aimed to ease the consulting of shared contacts for all 
           journalists at RTBF, through their mobile phone.
          
          I wrote the backend with Spring Data JPA & Hibernate. It was exposed via a REST interface 
           with Spring MVC & Jackson, and secured with Spring Security. All powered by Spring Boot.
          
          I also wrote the first draft of the HTML5 / AngularJS interface, as well as the Javascript stubs for Ajax calls.
          
          **Technologies involved**: Spring Framework / Data JPA / HATEOAS, JMS, Hibernate, Linux, 
           JUnit, Tomcat, Maven, Web Applications, Quartz Scheduler, Oracle database, AngularJS

       - header: Project "Radio On Demand (ROD)"
         title: Flex developer
         collapsible: true
         collapsed: true
         content: |        
          Project *ROD* was an automating tool to extract, compress and publish shows broadcasted on 
          the RTBF radio channels. They were then made available through the public web site.      
        
          I developed the backend with the usual suspects: Spring (Core, Integration, WS, Security) & Hibernate.
        
          Tools also used through web services: Arbor Media, Rhozet Carbon Coder.
        
          **Technologies involved**: Spring Framework, JMS, Hibernate, Linux, JUnit, Tomcat, Maven, 
           Web Applications, Quartz Scheduler, Oracle database

       - header: Project "Intranet de Production"
         title: Senior Java / Flex developer
         collapsible: true
         collapsed: true
         content: |
          Project *Intranet de Production* was a SOA-based system, developed in-house, aimed to connect v
           arious software used in TV productions: Dalet, EVS, ...
          It offered a wide view of various steps/aspects of the production of videos assets to be 
           broadcasted in the news reports or in TV shows.
          
          My role was to develop/improve some frontend and backend softwares to be integrated in 
           the dashboard application.
          A few screen I worked on: P2 footages ingest, human resources and material planning for 
           productions, editorial double-checking (before broadcasting).
          I also took care of upgrading an old Hudson server to a brand new Jenkins instance.
           
          **Technologies involved**: Flex/ActionScript 3, FlexMojos 3.6+, Spring BlazeDS Integration, 
           Dozer, Spring Core / Security / JMS / MVC / OXM / Integration / JDBC,
          Hibernate, Tomcat 6, Maven, HttpClient 4.1.2, PureMVC 2.0.4, ForkJoin framework, Mockito, 
           Activiti BPM 5.10, Jenkins CI

       - header: Project "Cockpit Radio"
         title: Flex developer
         collapsible: true
         collapsed: true
         content: |
          Project *Cockpit Radio* was a composite application constituting a centralized console aimed 
           to administer various aspects of the broadcasting of radio shows.
          It was a front-end interface for various services such as:
          * Netia message sources management (TCP/UDP)
          * RDS encoders management
          * On Air listening and past sounds replay
          * automatic VOD production for the guest sequence of show "Matin Première", also broadcasted on television.
    
          My role was to develop the frontend interface, in Flex, and to give advices on the architectural and development tasks on the backend.

       - header: Project "Perex Mobidesk"
         title: Flex developer
         collapsible: true
         collapsed: true
         content: |
          Project *Perex Mobidesk* was a Flex client interface used by radio speakers for traffic jam announcements.
          Original version of the application code was MXML-only based, making it very difficult to maintain and track bugs.
          I had to re-factor it using PureMVC as the foundation framework.
          
          Goals: better reactivity, better memory management, separation of concerns, ...
          
          I also Maven-ified the build process.
  
          **Technologies involved**: Flex/ActionScript 3, FlexMojos 3.6+

