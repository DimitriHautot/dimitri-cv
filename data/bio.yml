              header: August 2023 - Present
              title: Technical architect
              collapsible: true
              collapsed: false
              content: |
                *FOD Financiën / SPF Finances - Brussels - full-time - hybrid*
                
                The Biztax application is responsible for the taxation of companies in Belgium.
                The "Biztax 2" project is a complete rewrite of the current application.
                The main goals of the project are:
                * technology upgrade (from JEE & Struts on WebLogic 10 to Spring Boot on Red Hat OpenShift)
                * existing business features enhancement
                * better separation of concerns between the core business logic and the various outside world interactions. The code is designed around the hexagonal/ports & adapters architecture paradigm.
                
                I am in charge of defining the « to be » architecture, defining its building blocks and leading the technical implementation.
          
                I was also involved in the Belgian implementation of the 
                <a href="https://www.oecd.org/en/topics/sub-issues/global-minimum-tax/global-anti-base-erosion-model-rules-pillar-two.html" target="_blank">Pillar 2 OECD</a> 
                set of regulations.        
        
                **Technologies & skills:** English, hexagonal architecture, WebLogic, refactoring, agile development, coaching,
                Spring Boot, Java, ArchUnit, Apache Artemis, GitLab CI/CD, Argo CD, IBM Instana, Red Hat OpenShift

